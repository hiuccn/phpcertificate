<section class="w-full">
    <div class="px-4 py-20 mx-auto max-w-7xl">
        <div
                class="w-full px-0 pt-5 pb-6 mx-auto mt-4 mb-0 space-y-4 bg-transparent border-0 border-gray-200 rounded-lg md:bg-white md:border sm:w-10/12 md:w-8/12 lg:w-6/12 xl:w-4/12 md:px-6 sm:mt-8 sm:mb-5"
        >
            <h1 class="mb-5 text-xl font-light text-center text-gray-800 sm:text-center">
                欢迎来到{$site.name|htmlentities}</h1>
            <form class="pb-1 space-y-4" id="login-form" method="POST" action="">
                <input type="hidden" name="url" value="{$url|htmlentities}"/>
                {:token()}
                <label class="block">
                    <span class="block mb-1 text-xs font-medium text-gray-700">{:__('Account')}</span>
                    <input class="form-input" type="text" name="account"
                           placeholder="{:__('Email/Mobile/Username')}" inputmode="email" required/>
                </label>
                <label class="block">
                    <span class="block mb-1 text-xs font-medium text-gray-700">{:__('Password')}</span>
                    <input class="form-input" name="password" type="password" placeholder="{:__('Password')}"
                           required/>
                </label>
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" class="form-checkbox" name="keeplogin" checked/>
                        <span class="block ml-2 text-xs font-medium text-gray-700 cursor-pointer">{:__('Keep login')}</span>
                    </label>
                    <input type="submit" class="btn btn-primary" value="{:__('Sign in')}"/>
                </div>
            </form>
        </div>
        <p class="mb-4 space-y-2 text-sm text-left text-gray-600 sm:text-center sm:space-y-0">
            <a href="#" class="w-full btn btn-sm btn-link sm:w-auto">{:__('Forgot password')}</a>
            <a href="{:url('user/register')}?url={$url|urlencode|htmlentities}"
               class="w-full btn btn-sm btn-link sm:w-auto">{:__("Don't have an account? Sign up")}</a>
        </p>
    </div>
</section>
