<div class="w-full md:w-[600px] lg:w-[800px] h-[200px] w-full">
    <img src="__CDN__/assets/img/profile-background.jpg"
         class="w-full h-full rounded-tl-lg rounded-tr-lg">
</div>
<div class="flex flex-col items-center -mt-40">
    <div class="flex items-center space-x-2 mt-2 pb-8 pl-8">
        <p class="text-2xl">{$user.nickname|htmlentities}</p>
        <span class="bg-blue-500 rounded-full p-1" title="Verified">
            <svg xmlns="http://www.w3.org/2000/svg" class="text-gray-100 h-2.5 w-2.5" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="4"
                      d="M5 13l4 4L19 7"/>
            </svg>
        </span>
    </div>
    <img src="{$user.avatar|htmlentities|cdnurl}" class="w-40 border-4 border-white rounded-full">
</div>
<div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-4 pl-8 pr-8">
    <div class="px-6 py-6 bg-gray-100 border border-gray-300 rounded-lg shadow-xl">
        <div class="flex items-center justify-between">
            <span class="font-bold text-sm text-indigo-600">{:__('Money')}</span>
            <span class="text-xs bg-gray-200 hover:bg-gray-500 text-gray-500 hover:text-gray-200 px-2 py-1 rounded-lg transition duration-200 cursor-default">当前</span>
        </div>
        <div class="flex items-center justify-between mt-6">
            <div>
                <svg class="w-12 h-12 p-2.5 bg-indigo-400 bg-opacity-20 rounded-full text-indigo-600 border border-indigo-600"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24"
                     xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                          d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <div class="flex flex-col">
                <div class="flex items-end">
                    <span class="text-2xl 2xl:text-3xl font-bold">¥{$user.money}</span>
                </div>
            </div>
        </div>
    </div>
    <div class="px-6 py-6 bg-gray-100 border border-gray-300 rounded-lg shadow-xl">
        <div class="flex items-center justify-between">
            <span class="font-bold text-sm text-green-600">{:__('设备数')}</span>
            <span class="text-xs bg-gray-200 hover:bg-gray-500 text-gray-500 hover:text-gray-200 px-2 py-1 rounded-lg transition duration-200 cursor-default">当前</span>
        </div>
        <div class="flex items-center justify-between mt-6">
            <div>
                <svg class="w-12 h-12 p-2.5 bg-green-400 bg-opacity-20 rounded-full text-green-600 border border-green-600"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24"
                     xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                          d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                </svg>
            </div>
            <div class="flex flex-col">
                <div class="flex items-end">
                    <span class="text-2xl 2xl:text-3xl font-bold">{$user.score}</span>
                </div>
            </div>
        </div>
    </div>
</div>
