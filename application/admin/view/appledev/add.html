<form id="edit-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

  
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('ISS')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-udid" data-rule="required" class="form-control" name="row[iss]" type="text" >
        </div>
    </div>

  <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('KID')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-zsid" data-rule="required" class="form-control" name="row[kid]" type="text">
        </div>
    </div>
  <div class="form-group">
        <label for="c-p8" class="control-label col-xs-12 col-sm-2">{:__('P8')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-p8" class="form-control" size="35" name="row[p8]" type="text" value="">
                <div class="input-group-addon no-border no-padding">
                    <span><button type="button" id="faupload-p8" class="btn btn-danger faupload" data-input-id="c-p8" data-mimetype="*" data-multiple="false" data-preview-id="p-p8"><i class="fa fa-upload"></i> {:__('Upload')}</button></span><span><button type="button" id="fachoose-p8" class="btn btn-primary fachoose" data-input-id="c-p8" data-mimetype="*" data-multiple="false"><i class="fa fa-list"></i> {:__('Choose')}</button></span>
                   
                </div>
                <span class="msg-box n-right"></span>
            </div>
           
        </div>
    </div>


    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('备注')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-beizhu" data-rule="required"  class="form-control"  name="row[beizhu]" type="text" >
        </div>
    </div>
    
    
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-success btn-embossed disabled">{:__('OK')}</button>
            <button type="reset" class="btn btn-default btn-embossed">{:__('Reset')}</button>
        </div>
    </div>
</form>
